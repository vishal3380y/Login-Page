<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form-container">
        <div class="form-header">
            <h3>LOG IN</h3>
        </div>
        <div class="input-container">
            <input type="text" placeholder="username" required>
            <br>
            <input type="password" placeholder="password" required>
        <div class="forgot-password">
            <a href="forget.html">Forgot password</a>
        </div>
        <div class="button">
            <button class="submit" type="submit" class="login">Log In</button>
        </div>
        <div class="signup">
            Don't Have An Account?<a href="signup.html"> sign up</a>
        </div>
    </div>
    <hr>
    <div class="social-link">
        <button class="google" type="button"><i class="fa-brands fa-google"></i>Log In With Google</button>
        <br>
        <button class="twitter" type="button"><i class="fa-brands fa-twitter"></i>Log In With Twitter</button>
    </div>
    </div>
</body>
</html>
